<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Damage Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-blue-900 text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-satellite-dish mr-2"></i> Disaster Assessment AI</h1>
            <span class="text-sm bg-blue-700 py-1 px-3 rounded">Powered by Deep Learning</span>
        </div>
    </header>

    <main class="container mx-auto p-6">
        <div class="bg-white p-8 rounded-lg shadow-lg mb-8">
            <h2 class="text-xl font-semibold mb-6 border-b pb-2">1. Upload Satellite Imagery</h2>
            
            <form id="uploadForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition">
                    <label class="cursor-pointer block">
                        <i class="fas fa-history text-4xl text-green-500 mb-3"></i>
                        <h3 class="font-bold text-gray-700">Pre-Disaster Image</h3>
                        <input type="file" id="preFile" class="hidden" accept="image/*" required>
                    </label>
                    <div id="prePreview" class="mt-4 hidden h-48 bg-gray-200 rounded bg-cover bg-center"></div>
                </div>

                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition">
                    <label class="cursor-pointer block">
                        <i class="fas fa-house-damage text-4xl text-red-500 mb-3"></i>
                        <h3 class="font-bold text-gray-700">Post-Disaster Image</h3>
                        <input type="file" id="postFile" class="hidden" accept="image/*" required>
                    </label>
                    <div id="postPreview" class="mt-4 hidden h-48 bg-gray-200 rounded bg-cover bg-center"></div>
                </div>
            </form>

            <button onclick="analyzeImages()" id="analyzeBtn" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition flex justify-center items-center">
                <span>Analyze Damage</span>
            </button>
        </div>

        <div id="resultsArea" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-lg shadow-lg h-fit">
                <h3 class="text-lg font-bold mb-4 text-gray-800">Assessment Report</h3>
                <div class="mb-6">
                    <p class="text-gray-500 text-sm">Overall Status</p>
                    <p id="resStatus" class="text-2xl font-bold text-red-600">--</p>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center p-3 bg-gray-100 rounded">
                        <span>Major Damage Pixels</span>
                        <span id="resMajor" class="font-bold">0</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-lg">
                <h3 class="text-lg font-bold mb-4 text-gray-800">AI Damage Detection Map</h3>
                <div class="relative w-full h-96 bg-gray-200 rounded overflow-hidden flex items-center justify-center">
                    <img id="resultImage" class="max-w-full max-h-full object-contain" src="" alt="Analysis Result">
                </div>
            </div>
        </div>
    </main>

    <script>
        function setupPreview(inputId, previewId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const preview = document.getElementById(previewId);
                        preview.style.backgroundImage = `url(${e.target.result})`;
                        preview.classList.remove('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
        setupPreview('preFile', 'prePreview');
        setupPreview('postFile', 'postPreview');

        async function analyzeImages() {
            const preFile = document.getElementById('preFile').files[0];
            const postFile = document.getElementById('postFile').files[0];
            const btn = document.getElementById('analyzeBtn');

            if (!preFile || !postFile) {
                alert("Please select both images.");
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append("pre_disaster", preFile);
            formData.append("post_disaster", postFile);

            try {
                // FIXED: Explicit URL for Backend
                // Change 8001 to 8002
                  const response = await fetch('http://127.0.0.1:8002/analyze', {
    method: 'POST',
    body: formData
                    
                });
                
                if (!response.ok) throw new Error('Backend Error');

                const data = await response.json();
                document.getElementById('resultsArea').classList.remove('hidden');
                document.getElementById('resultImage').src = data.processed_image;
                document.getElementById('resStatus').innerText = data.severity;
                document.getElementById('resMajor').innerText = data.details.Major;
                document.getElementById('resultsArea').scrollIntoView({behavior: 'smooth'});

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = 'Analyze Damage';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
